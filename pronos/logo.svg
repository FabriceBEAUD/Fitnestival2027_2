<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d3a5f"/>
      <stop offset="0.55" stop-color="#12263f"/>
      <stop offset="1" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe066"/>
      <stop offset="0.5" stop-color="#ffd60a"/>
      <stop offset="1" stop-color="#ffb703"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e676"/>
      <stop offset="1" stop-color="#00c853"/>
    </linearGradient>
    <radialGradient id="ballShade" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.75" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#cfd9e6"/>
    </radialGradient>
  </defs>

  <!-- fond -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- anneau vert discret -->
  <circle cx="256" cy="196" r="136" fill="none" stroke="url(#green)" stroke-width="10" opacity="0.9"/>

  <!-- ballon -->
  <circle cx="256" cy="196" r="112" fill="url(#ballShade)"/>
  <!-- pentagone central -->
  <polygon points="256,148 302,181 284,235 228,235 210,181" fill="#12263f"/>
  <!-- coutures vers le bord -->
  <g stroke="#12263f" stroke-width="9" stroke-linecap="round">
    <line x1="256" y1="148" x2="256" y2="88"/>
    <line x1="302" y1="181" x2="360" y2="160"/>
    <line x1="284" y1="235" x2="320" y2="288"/>
    <line x1="228" y1="235" x2="192" y2="288"/>
    <line x1="210" y1="181" x2="152" y2="160"/>
  </g>
  <!-- pièces sombres sur le pourtour -->
  <g fill="#12263f">
    <path d="M 256 88 A 112 112 0 0 1 305 100 L 285 128 L 227 128 L 207 100 A 112 112 0 0 1 256 88 Z" transform="rotate(0 256 196)" opacity="0"/>
  </g>

  <!-- XP doré -->
  <text x="256" y="448" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="150" fill="url(#gold)" letter-spacing="2">XP</text>
</svg>
